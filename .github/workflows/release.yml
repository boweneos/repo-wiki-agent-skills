name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling
      
      - name: Build distribution packages
        run: |
          python -m build
      
      - name: Create release archive
        run: |
          # Create a clean archive of the skills
          tar -czf repo-wiki-agent-skills-${{ github.ref_name }}.tar.gz \
            skills/ \
            scripts/ \
            README.md \
            LICENSE \
            CHANGELOG.md \
            IMPLEMENTATION_SUMMARY.md \
            QUICK_START.md \
            RELEASE.md \
            pyproject.toml \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='.DS_Store' \
            --exclude='.git' \
            --exclude='.github'
          
          # Create a zip archive as well
          zip -r repo-wiki-agent-skills-${{ github.ref_name }}.zip \
            skills/ \
            scripts/ \
            README.md \
            LICENSE \
            CHANGELOG.md \
            IMPLEMENTATION_SUMMARY.md \
            QUICK_START.md \
            RELEASE.md \
            pyproject.toml \
            -x "*.pyc" "*__pycache__*" "*.DS_Store" ".git/*" ".github/*"
      
      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Generate release notes
        id: release_notes
        run: |
          # Extract changelog for this version if CHANGELOG.md exists
          if [ -f CHANGELOG.md ]; then
            # Try to extract the section for this version
            awk '/## \[${{ steps.get_version.outputs.VERSION }}\]/{flag=1; next} /## \[/{flag=0} flag' CHANGELOG.md > release_notes.md
          fi
          
          # If no specific notes found, create generic ones
          if [ ! -s release_notes.md ]; then
            cat > release_notes.md << EOF
          ## What's Changed
          
          Release ${{ github.ref_name }} of Repo Wiki Agent Skills.
          
          ### Features
          - Citation-backed documentation generation
          - Incremental wiki updates
          - MkDocs-compatible output
          - Agent Skills specification compliant
          
          ### Installation
          
          Download and extract the archive, or install via pip:
          
          \`\`\`bash
          pip install dist/repo_wiki_agent_skills-${{ steps.get_version.outputs.VERSION }}-py3-none-any.whl
          \`\`\`
          
          ### Documentation
          
          See [README.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md) for usage instructions.
          EOF
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz
            repo-wiki-agent-skills-${{ github.ref_name }}.tar.gz
            repo-wiki-agent-skills-${{ github.ref_name }}.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload to PyPI (optional)
        if: ${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          # Only upload if PYPI_API_TOKEN is set
          if [ -n "$TWINE_PASSWORD" ]; then
            twine upload dist/*
          else
            echo "PYPI_API_TOKEN not set, skipping PyPI upload"
          fi
